<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOJO | Admin Glass</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root {
            --pink: #e84393;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: 'Segoe UI', sans-serif;
            /* Animated Mesh Gradient Background */
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #581c87 100%);
            overflow-y: auto;
        }

        /* Floating background shapes for extra glass effect depth */
        .shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            border-radius: 50%;
        }
        .shape-1 { width: 300px; height: 300px; background: var(--pink); top: -50px; right: -50px; opacity: 0.4; }
        .shape-2 { width: 400px; height: 400px; background: #4a90d9; bottom: -100px; left: -100px; opacity: 0.3; }

        .admin-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            color: #fff;
        }

        .admin-card h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .admin-card p {
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--pink);
        }

        select, input, textarea {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        select option { background: #1e1b4b; }

        input:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--pink);
            box-shadow: 0 0 15px rgba(232, 67, 147, 0.3);
        }

        .btn-update {
            width: 100%;
            padding: 16px;
            background: var(--pink);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(232, 67, 147, 0.3);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-update:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(232, 67, 147, 0.5);
            filter: brightness(1.1);
        }

        #status {
            margin-top: 20px;
            font-size: 0.9rem;
            height: 20px;
        }
        .back-btn {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 10000;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        @media (max-width: 480px) {
            .back-btn {
                top: 15px;
                left: 15px;
                padding: 8px 15px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i>Back to Shop
    </a>
    <div id="login-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 9999; display: flex; align-items: center; justify-content: center;">
        <div class="glass-card" style="padding: 40px; text-align: center; border-radius: 20px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2);">
            <h2 style="color: white;">Staff Access Only</h2>
            <input type="password" id="adminPass" placeholder="Enter Password" style="padding: 15px; border-radius: 10px; border: none; outline: none; width: 250px; margin-top: 10px;">
            <button onclick="checkPass()" style="margin-top: 20px; padding: 12px 30px; background: #e84393; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold;">Login</button>
            <p id="fail-msg" style="color: #ff7675; margin-top: 15px; font-size: 0.9rem;"></p>
        </div>
    </div>

    <div id="admin-content" style="display: none;">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>

        <div class="admin-card">
            <h1>JOJO</h1>
            <p>PRODUCT MANAGEMENT</p>

            <div class="input-group">
                <i class="fas fa-search"></i>
                <select id="prodID" onchange="toggleNewProductFields()">
                    <option value="">-- Select Product --</option>
                    <option value="NEW">+ Add New Product</option>
                    <option value="mouth-spray">Mouth Spray</option>
                    <option value="humidifier">Humidifier</option>
                    <option value="shower-gel">Shower Gel</option>
                    <option value="body-splash">Body Splash</option>
                    <option value="perfumes">Perfumes</option>
                </select>
            </div>

            <div class="input-group" id="newNameGroup" style="display:none;">
                <i class="fas fa-pen-nib"></i>
                <input type="text" id="newProdName" placeholder="Product Name (e.g. Misty Rose)">
            </div>

            <div class="input-group">
                <i class="fas fa-coins"></i>
                <input type="number" id="curPrice" placeholder="Selling Price (Ugx)">
            </div>

            <div class="input-group">
                <i class="fas fa-history"></i>
                <input type="number" id="oldPrice" placeholder="Original Price (Ugx)">
            </div>

            <div class="input-group">
                <i class="fas fa-camera"></i>
                <input type="file" id="imageFile" accept="image/*" style="padding-top: 12px;">
            </div>
            <div id="upload-progress" style="color: #55efc4; font-size: 0.8rem; margin-bottom: 15px; display: none;">
                Uploading image... 0%
            </div>

            <div class="input-group">
                <i class="fas fa-align-left"></i>
                <textarea id="prodDesc" placeholder="Product Description..." style="padding-left: 45px; height: 100px; resize: vertical;"></textarea>
            </div>

            <button class="btn-update" onclick="savePrice()">
                <i class="fas fa-cloud-upload-alt"></i> Upload to Shop
            </button>

            <div id="status"></div>
        </div>

        <div class="admin-card" style="margin-top: 3rem; width: 90%; max-width: 450px;">
            <h2 style="color: #fff; margin-bottom: 1.5rem; font-size: 2rem;">
                <i class="fas fa-shopping-bag" style="color: var(--pink); margin-right: 10px;"></i>Incoming Orders
            </h2>
            <div id="orders-list" style="color: #fff; max-height: 400px; overflow-y: auto;">
                <p style="opacity: 0.6; text-align: center;">Waiting for orders...</p>
            </div>
            <h2 style="margin-top: 40px; color: var(--pink);">Manage Reviews</h2>
            <div id="admin-reviews-list" style="text-align: left; margin-top: 20px;">
            </div>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    alert("JS LOADED");
    function checkPass() {
        const pass = document.getElementById('adminPass').value;
        const overlay = document.getElementById('login-overlay');
        const content = document.getElementById('admin-content');
        const fail = document.getElementById('fail-msg');

        if (pass === 'Jojo2026') {
            overlay.style.display = 'none';
            content.style.display = 'block';
            sessionStorage.setItem('isAdmin', 'true');
        } else {
            fail.innerText = "❌ Incorrect Password";
        }
    }

    window.onload = () => {
        if (sessionStorage.getItem('isAdmin') === 'true') {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
        }
    };

    const firebaseConfig = {
        apiKey: "AIzaSyA9ER2RfVM4Iw7Ka6eQ100KDnbuFI31_pg",
        authDomain: "jojo-collection.firebaseapp.com",
        projectId: "jojo-collection",
        storageBucket: "jojo-collection.firebasestorage.app",
        messagingSenderId: "469101720449",
        appId: "1:469101720449:web:c668b39259ea141f69ee80",
        measurementId: "G-J9B2NQ19P5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    function toggleNewProductFields() {
        const selection = document.getElementById('prodID').value;
        const nameGroup = document.getElementById('newNameGroup');
        nameGroup.style.display = (selection === 'NEW') ? 'block' : 'none';
    }

    // FIXED: Removed duplicate function and unified image upload logic
    async function savePrice() {
        const selectValue = document.getElementById('prodID').value;
        const newName = document.getElementById('newProdName').value;
        const cur = parseInt(document.getElementById('curPrice').value);
        const old = parseInt(document.getElementById('oldPrice').value);
        const fileInput = document.getElementById('imageFile');
        const desc = document.getElementById('prodDesc').value;
        const status = document.getElementById('status');

        // 1. Determine the Document ID
        let finalID = selectValue;
        if (selectValue === 'NEW') {
            if (!newName) { status.innerHTML = '❌ Name required'; return; }
            finalID = newName.toLowerCase().replace(/\s+/g, '-');
        }

        if (!finalID || !cur || !old) {
            status.innerHTML = '<span style="color: #ff7675;">❌ Enter required fields</span>';
            return;
        }

        status.innerHTML = "⏳ Uploading...";
        let finalImageUrl = "many.jpg"; // Default fallback

        // 2. Handle Image Upload FIRST
        if (fileInput.files[0]) {
            const storageRef = storage.ref(`products/${finalID}`);
            const progressDiv = document.getElementById('upload-progress');
            
            progressDiv.style.display = 'block';
            const uploadTask = storageRef.put(file);

            uploadTask.on('state_changed', 
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    progressDiv.innerText = `Uploading image... ${Math.round(progress)}%`;
                }, 
                (error) => { 
                    status.innerHTML = "❌ Upload failed: " + error.message;
                    progressDiv.style.display = 'none';
                }, 
                async () => {
                    finalImageUrl = await uploadTask.snapshot.ref.getDownloadURL();
                    progressDiv.style.display = 'none';
                    // NOW save to Firestore AFTER image upload completes
                    saveProductToFirestore(finalID, cur, old, finalImageUrl, desc, status, fileInput);
                }
            );
        } else {
            // No image selected, save with default
            saveProductToFirestore(finalID, cur, old, finalImageUrl, desc, status, fileInput);
        }
    }

    // FIXED: New function to handle Firestore save (called AFTER image upload)
    function saveProductToFirestore(finalID, cur, old, finalImageUrl, desc, status, fileInput) {
        db.collection('products').doc(finalID).set({
            currentPrice: cur,
            oldPrice: old,
            image: finalImageUrl,
            description: desc || 'Premium fragrance from Jojo Collections.',
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true })
        .then(() => {
            status.innerHTML = '<span style="color: #55efc4;">✅ Product Live!</span>';
            // Reset form
            fileInput.value = '';
            document.getElementById('newProdName').value = '';
            document.getElementById('curPrice').value = '';
            document.getElementById('oldPrice').value = '';
            document.getElementById('prodDesc').value = '';
            document.getElementById('prodID').value = '';
            setTimeout(() => { status.innerHTML = ''; }, 3000);
        })
        .catch(err => {
            status.innerHTML = '❌ Error: ' + err.message;
        });
    }

    // Load Orders
    db.collection('orders').onSnapshot((snapshot) => {
        const ordersList = document.getElementById('orders-list');
        ordersList.innerHTML = '';

        if (snapshot.empty) {
            ordersList.innerHTML = '<p>No orders yet!</p>';
            return;
        }

        snapshot.forEach((doc) => {
            const order = doc.data();
            const date = new Date(order.createdAt?.toDate?.() || new Date()).toLocaleDateString();
            
            ordersList.innerHTML += `
                <div style="background: rgba(255,255,255,0.1); padding: 1.5rem; border-radius: 10px; margin-bottom: 1rem; border: 1px solid var(--border);">
                    <div style="display: flex; justify-content: space-between;">
                        <strong>Phone: ${order.phone}</strong>
                        <span>${date}</span>
                    </div>
                    <p style="margin: 0.5rem 0;">Items: ${order.items.map(i => i.name).join(', ')}</p>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="color: var(--pink); font-weight: bold;">Total: Ugx ${order.total.toLocaleString()}</span>
                        <button onclick="deleteOrder('${doc.id}')" style="background: none; color: #ff7675; cursor: pointer;"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `;
        });
    });

    window.deleteOrder = function(id) {
        if(confirm("Mark this order as completed and delete?")) {
            db.collection('orders').doc(id).delete()
            .then(() => {
                console.log("Order deleted!");
            })
            .catch((error) => {
                console.error("Error removing order: ", error);
            });
        }
    }

    // Load Reviews - FIXED: Consistent field name (comment)
    db.collection('reviews').onSnapshot(snapshot => {
        const list = document.getElementById('admin-reviews-list');
        list.innerHTML = '';
        if (snapshot.empty) {
            list.innerHTML = '<p>No reviews found in database.</p>';
            return;
        }
        snapshot.docs.forEach(doc => {
            const rev = doc.data();
            const text = rev.comment || "Empty review"; 
            const rating = rev.rating || 0;
            list.innerHTML += `
                <div style="background: rgba(255,255,255,0.05); padding: 10px; margin-bottom: 10px; border-radius: 10px; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong>${rev.name} (${rating}⭐)</strong><br>
                        <span>${text.substring(0, 50)}...</span>
                    </div>
                    <button onclick="db.collection('reviews').doc('${doc.id}').delete()" style="background:none; color:#ff7675; cursor:pointer;"><i class="fas fa-trash"></i></button>
                </div>
            `;
        });
    }, err => {
        console.error("Database Error: " + err.message);
    });
</script>

</body>
</html>
